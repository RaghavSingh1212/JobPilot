<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Copilot</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Job Copilot</h1>
          <p id="subtitle">Application autofill</p>
        </div>
        <button id="options" type="button" title="Open settings">Settings</button>
      </header>

      <section class="notice">
        Open a job application page, then autofill. The extension will fill what it knows and show anything that needs manual review.
      </section>

      <section id="summary" class="panel" hidden>
        <strong id="summaryTitle">Autofill complete</strong>
        <p id="summaryText"></p>
      </section>

      <footer>
        <button id="autofill" type="button">Autofill application</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
